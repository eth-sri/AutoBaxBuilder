repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        stages: [pre-commit]
        language: system
        entry: isort
        types: [python]
        args: ["--profile", "black"]

      - id: black
        name: black
        stages: [pre-commit]
        language: system
        entry: black
        types: [python]

      - id: flake8
        name: flake8
        stages: [pre-commit]
        language: system
        entry: flake8
        types: [python]
        exclude: setup.py

      - id: mypy
        name: mypy
        stages: [pre-commit]
        language: system
        entry: mypy
        types: [python]
        pass_filenames: false
