name: baxbench-agent
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - scipy
  - pandas
  - jupyterlab
  - ipywidgets
  - matplotlib
  - tqdm
  - black
  - flake8
  - isort
  - mypy
  - pip
  - pydantic=2.5.2  # For data validation
  - pyyaml=6.0.1
  - mypy=1.8.0  # Style enforcement from here
  - flake8=7.0.0
  - black=24.2.0
  - isort=5.13.2
  - pre-commit
  - pip:
    - together
    - openai
    - anthropic
    - requests
    - openapi_spec_validator
    - docker
    - docker-stubs
    - imageio
    - pdfplumber
    - termcolor
    - types-tabulate
    - types-requests
    - types-PyYAML
    - seaborn
    - beautifulsoup4
    - jwt
    - natsort
    - ffmpeg-python
    - Wand
    - pdfplumber
    - opencv-python
    - nodejs
    - typescript
