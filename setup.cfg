[black]
line-length = 100
[isort]
profile = black
[mypy]
files=src
ignore_missing_imports=true
exclude=(src/scenarios|src/evaluation/artifacts)
[flake8]
extend-ignore = E203, E501, F405
exclude =
    .git
    __pycache__
    src/scenarios/*
max-complexity = 22
max-line-length = 100
per-file-ignores = __init__.py:F401,F403
